<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SmartLibrary Engine</title>
    <script>
      // Fix for "Cannot set property ethereum of #<Window> which has only a getter"
      // This can occur when browser extensions attempt to inject into the applet's iframe.
      try {
        if (!window.hasOwnProperty('ethereum')) {
          let ethereumValue = undefined;
          Object.defineProperty(window, 'ethereum', {
            get: () => ethereumValue,
            set: (val) => { ethereumValue = val; },
            configurable: true,
            enumerable: true
          });
        }
      } catch (e) {
        console.warn('Could not initialize ethereum shim:', e);
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
